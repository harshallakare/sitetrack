# Production deployment stack -- works on any Linux server with Docker +
# the Docker Compose plugin installed. Nothing else is required (no Node,
# no pnpm, no Postgres/MySQL client) on the host itself.
#
# `web` and `api` are published to 127.0.0.1 only -- not reachable from
# outside this server on their own. Either:
#   (a) use the bundled `caddy` service for automatic public HTTPS (opt in
#       with `docker compose --profile caddy ... up -d`), or
#   (b) point your own existing nginx/Caddy/etc. at 127.0.0.1:3000 (web) and
#       127.0.0.1:4000 (api, for /webhooks/* only -- see Caddyfile for why).
# See "Running alongside an existing site" in DEPLOY.md for (b).
#
# Uses SQLite by default (see DATABASE_PROVIDER/DATABASE_URL in
# .env.production.example) -- the `sqlite_data` volume below persists the
# database file across container recreation. Fine for a single small
# deployment; see "Using Postgres or MySQL instead of SQLite" in DEPLOY.md
# if you need real concurrent-write support.
#
# Usage: see scripts/deploy.sh and scripts/update.sh, or DEPLOY.md.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        DATABASE_PROVIDER: ${DATABASE_PROVIDER:-sqlite}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-sqlite}
    volumes:
      - api_uploads:/repo/apps/api/uploads
      - api_backups:/repo/apps/api/backups
      - sqlite_data:/repo/packages/database/prisma/data
    ports:
      # Loopback-only -- lets an existing host reverse proxy reach /webhooks/*
      # directly (see Caddyfile). Not reachable from outside this server.
      - "127.0.0.1:${API_HOST_BIND_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env.production
    ports:
      # Loopback-only -- point your existing reverse proxy here, or use the
      # bundled `caddy` service instead (see note at the top of this file).
      - "127.0.0.1:${WEB_HOST_BIND_PORT:-3000}:3000"

  # Opt-in automatic-HTTPS reverse proxy. Skipped by default (only starts
  # with `docker compose --profile caddy ... up -d`) since most servers
  # either use this or an existing reverse proxy, not both.
  caddy:
    image: caddy:2-alpine
    profiles: ["caddy"]
    restart: unless-stopped
    ports:
      # Override in .env.production if 80/443 are already taken by another
      # site on this server -- e.g. CADDY_HTTP_BIND=127.0.0.1:8080 to keep
      # SiteTrack internal-only and let an existing reverse proxy forward to
      # it. See "Running alongside an existing site" in DEPLOY.md.
      - "${CADDY_HTTP_BIND:-80}:80"
      - "${CADDY_HTTPS_BIND:-443}:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  api_uploads:
  # Pre-restore safety snapshots written by the admin panel's Database page
  # (see apps/api/src/platform-admin/database-backup.service.ts) -- survives
  # container recreation so a bad restore stays recoverable.
  api_backups:
  # SQLite database file (DATABASE_PROVIDER=sqlite, the default) -- survives
  # container recreation. Unused/empty if you switch to Postgres or MySQL.
  sqlite_data:
  caddy_data:
  caddy_config:
